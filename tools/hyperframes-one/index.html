<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #faf6f0;
        color: #5d4a36;
        font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 12%, rgba(255, 237, 184, 0.9) 0 17%, transparent 31%),
          linear-gradient(180deg, #fff8e8 0%, #faf6f0 47%, #f4eddc 100%);
      }

      .paper-grain {
        position: absolute;
        inset: 0;
        opacity: 0.3;
        background-image:
          radial-gradient(circle at 18% 24%, rgba(139, 94, 0, 0.06) 0 1px, transparent 1.5px),
          radial-gradient(circle at 70% 48%, rgba(93, 74, 54, 0.05) 0 1px, transparent 1.5px);
        background-size: 34px 34px, 47px 47px;
      }

      .sun {
        position: absolute;
        left: 405px;
        top: 108px;
        width: 270px;
        height: 270px;
        border-radius: 50%;
        background: #ffedb8;
        box-shadow: 0 18px 70px rgba(255, 201, 71, 0.24);
      }

      .cloud {
        position: absolute;
        width: 260px;
        height: 72px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 2px solid rgba(239, 231, 220, 0.7);
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        background: inherit;
      }

      .cloud::before {
        left: 38px;
        top: -36px;
        width: 90px;
        height: 90px;
      }

      .cloud::after {
        right: 40px;
        top: -48px;
        width: 116px;
        height: 116px;
      }

      .cloud-left {
        left: 70px;
        top: 205px;
        transform: scale(0.92);
      }

      .cloud-right {
        right: 62px;
        top: 292px;
        transform: scale(0.72);
      }

      .meadow {
        position: absolute;
        left: -45px;
        right: -45px;
        bottom: -40px;
        height: 730px;
        border-radius: 54% 54% 0 0 / 18% 18% 0 0;
        background:
          radial-gradient(ellipse at 12% 68%, rgba(255, 217, 217, 0.76) 0 9%, transparent 10%),
          radial-gradient(ellipse at 78% 68%, rgba(255, 224, 194, 0.72) 0 10%, transparent 11%),
          linear-gradient(180deg, #d8e8c5 0%, #edf2d5 44%, #f6e8c8 100%);
        border-top: 4px solid rgba(156, 192, 119, 0.28);
      }

      .hill {
        position: absolute;
        left: -80px;
        right: -80px;
        height: 430px;
        bottom: 438px;
        border-radius: 50% 50% 0 0 / 30% 30% 0 0;
        background: linear-gradient(180deg, rgba(212, 232, 240, 0.42), rgba(216, 232, 197, 0.74));
      }

      .flower {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffd9d9;
        box-shadow:
          18px 8px 0 #ffe0c2,
          38px -4px 0 #fff4c7,
          62px 10px 0 #d4e8f0;
        opacity: 0.85;
      }

      .flower-a {
        left: 116px;
        bottom: 328px;
      }

      .flower-b {
        right: 210px;
        bottom: 248px;
        transform: scale(0.85);
      }

      .flower-c {
        left: 344px;
        bottom: 128px;
        transform: scale(0.7);
      }

      .headline {
        position: absolute;
        top: 222px;
        left: 0;
        width: 100%;
        text-align: center;
        color: #7a6a55;
        font-size: 46px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .stage-card {
        position: absolute;
        left: 96px;
        top: 410px;
        width: 888px;
        height: 682px;
        border-radius: 56px;
        background: rgba(255, 250, 236, 0.94);
        border: 4px solid rgba(255, 201, 71, 0.55);
        box-shadow: 0 22px 55px rgba(139, 94, 0, 0.12);
        overflow: hidden;
      }

      .stage-sky {
        position: absolute;
        inset: 0 0 214px 0;
        background:
          radial-gradient(circle at 50% 9%, rgba(255, 201, 71, 0.23) 0 15%, transparent 32%),
          linear-gradient(180deg, #fff4c7 0%, #fffaf0 76%);
      }

      .stage-ground {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 282px;
        border-radius: 50% 50% 0 0 / 24% 24% 0 0;
        background: linear-gradient(180deg, #d8e8c5 0%, #f2e1bf 100%);
      }

      .horizon-line {
        position: absolute;
        left: 176px;
        top: 368px;
        width: 536px;
        height: 28px;
        border-radius: 99px;
        background: #e8a800;
        box-shadow: 0 12px 0 rgba(139, 94, 0, 0.1);
        transform-origin: 50% 50%;
      }

      .line-label {
        position: absolute;
        left: 96px;
        top: 858px;
        width: 888px;
        text-align: center;
        color: #8b5e00;
        font-size: 36px;
        font-weight: 800;
      }

      .large-char {
        position: absolute;
        left: 0;
        top: 1108px;
        width: 100%;
        text-align: center;
        color: #e8a800;
        font-size: 360px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
        text-shadow: 0 18px 0 rgba(139, 94, 0, 0.07);
      }

      .pinyin {
        position: absolute;
        left: 0;
        top: 1460px;
        width: 100%;
        text-align: center;
        color: #7a6a55;
        font-family: "SF Pro Rounded", "Noto Sans SC", sans-serif;
        font-size: 82px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .meaning {
        position: absolute;
        left: 166px;
        right: 166px;
        top: 1582px;
        height: 96px;
        border-radius: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 38px;
        background: rgba(255, 250, 236, 0.92);
        border: 3px solid #efe7dc;
        color: #5d4a36;
        font-size: 40px;
        font-weight: 800;
      }

      .pill {
        min-width: 144px;
        padding: 16px 28px;
        border-radius: 999px;
        border: 3px solid #e8d9c0;
        background: rgba(255, 255, 255, 0.78);
        text-align: center;
      }

      .next-chip {
        position: absolute;
        left: 240px;
        top: 1728px;
        width: 600px;
        height: 92px;
        border-radius: 46px;
        background: #ffc947;
        box-shadow: 0 14px 32px rgba(255, 201, 71, 0.26);
        color: #5d4a36;
        font-size: 40px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .animal {
        position: absolute;
        object-fit: contain;
        filter: drop-shadow(0 8px 8px rgba(93, 74, 54, 0.12));
        transform-origin: 50% 100%;
      }

      .rabbit {
        left: 108px;
        top: 438px;
        width: 104px;
      }

      .ducklings {
        right: 112px;
        top: 434px;
        width: 116px;
      }

      .bird {
        right: 238px;
        top: 284px;
        width: 92px;
      }

      .lamb {
        left: 152px;
        bottom: 182px;
        width: 118px;
      }

      .bluebird {
        left: 776px;
        bottom: 312px;
        width: 112px;
      }

      .note {
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ffc947;
        opacity: 0.85;
      }

      .note-a {
        left: 334px;
        top: 708px;
      }

      .note-b {
        right: 360px;
        top: 648px;
        background: #f5a8a8;
      }

      .note-c {
        left: 496px;
        top: 550px;
        background: #8fbed4;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1920"
    >
      <div class="clip paper-grain" data-start="0" data-duration="6" data-track-index="0"></div>
      <div class="clip sun" data-start="0" data-duration="6" data-track-index="1"></div>
      <div class="clip cloud cloud-left" data-start="0" data-duration="6" data-track-index="2"></div>
      <div class="clip cloud cloud-right" data-start="0" data-duration="6" data-track-index="3"></div>
      <div class="clip hill" data-start="0" data-duration="6" data-track-index="4"></div>
      <div class="clip meadow" data-start="0" data-duration="6" data-track-index="5"></div>
      <div class="clip flower flower-a" data-start="0" data-duration="6" data-track-index="6"></div>
      <div class="clip flower flower-b" data-start="0" data-duration="6" data-track-index="7"></div>
      <div class="clip flower flower-c" data-start="0" data-duration="6" data-track-index="8"></div>

      <div class="clip headline" data-start="0" data-duration="6" data-track-index="9">认一认</div>

      <section class="clip stage-card" data-layout-allow-overflow data-start="0" data-duration="6" data-track-index="10">
        <div class="stage-sky"></div>
        <div class="stage-ground"></div>
        <div class="horizon-line"></div>
        <img class="animal rabbit" src="assets/animals/rabbit.png" alt="" />
        <img class="animal ducklings" src="assets/animals/ducklings.png" alt="" />
        <img class="animal bird" src="assets/animals/bird.png" alt="" />
        <div class="note note-a"></div>
        <div class="note note-b"></div>
        <div class="note note-c"></div>
      </section>

      <div class="clip line-label" data-start="0" data-duration="6" data-track-index="11">一条平平的线，就是“一”</div>
      <div class="clip large-char" data-start="0" data-duration="6" data-track-index="12">一</div>
      <div class="clip pinyin" data-start="0" data-duration="6" data-track-index="13">yī</div>
      <div class="clip meaning" data-start="0" data-duration="6" data-track-index="14">
        <span class="pill">一个</span>
        <span class="pill">一条线</span>
      </div>
      <div class="clip next-chip" data-start="0" data-duration="6" data-track-index="15">下一步</div>
      <img class="clip animal lamb" data-start="0" data-duration="6" data-track-index="16" src="assets/animals/lamb.png" alt="" />
      <img class="clip animal bluebird" data-start="0" data-duration="6" data-track-index="17" src="assets/animals/bluebird.png" alt="" />
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.out" } });

      tl.set(
        [
          ".headline",
          ".stage-card",
          ".horizon-line",
          ".line-label",
          ".large-char",
          ".pinyin",
          ".meaning",
          ".next-chip",
          ".animal",
          ".note",
        ],
        { opacity: 0 }
      );
      tl.set(".horizon-line", { scaleX: 0 });
      tl.set(".large-char", { y: 76, scale: 0.94 });
      tl.set(".pinyin", { y: 32 });
      tl.set(".meaning", { y: 28 });
      tl.set(".next-chip", { y: 36 });

      tl.to(".sun", { scale: 1.03, duration: 2.8, repeat: 1, yoyo: true, ease: "sine.inOut" }, 0);
      tl.from(".cloud-left", { x: -38, duration: 6, ease: "none" }, 0);
      tl.from(".cloud-right", { x: 46, duration: 6, ease: "none" }, 0);
      tl.to(".headline", { opacity: 1, y: -8, duration: 0.5 }, 0.12);
      tl.to(".stage-card", { opacity: 1, y: -14, duration: 0.7 }, 0.2);

      tl.to(".rabbit", { opacity: 1, y: -14, scale: 1.02, duration: 0.55 }, 0.62);
      tl.to(".ducklings", { opacity: 1, y: -12, scale: 1.02, duration: 0.55 }, 0.78);
      tl.to(".bird", { opacity: 1, y: -18, duration: 0.55 }, 0.94);
      tl.to(".rabbit", { y: -24, duration: 0.55, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.2);
      tl.to(".ducklings", { x: -28, duration: 1.2, ease: "sine.inOut" }, 1.08);
      tl.to(".bird", { x: -70, y: 18, duration: 1.0, ease: "sine.inOut" }, 1.52);

      tl.to(".horizon-line", { opacity: 1, scaleX: 1, duration: 0.88, ease: "power3.out" }, 1.26);
      tl.to(".note", { opacity: 1, y: -28, stagger: 0.08, duration: 0.35 }, 1.75);
      tl.to(".note", { opacity: 0, y: -58, stagger: 0.07, duration: 0.55 }, 2.12);
      tl.to(".line-label", { opacity: 1, y: -10, duration: 0.45 }, 2.18);

      tl.to(".stage-card", { scale: 0.93, y: -42, duration: 0.75, ease: "sine.inOut" }, 2.82);
      tl.to(".large-char", { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "back.out(1.2)" }, 3.0);
      tl.to(".pinyin", { opacity: 1, y: 0, duration: 0.45 }, 3.48);
      tl.to(".meaning", { opacity: 1, y: 0, duration: 0.45 }, 3.76);
      tl.to(".lamb", { opacity: 1, y: -18, duration: 0.58 }, 4.0);
      tl.to(".bluebird", { opacity: 1, x: -36, y: -18, duration: 0.7 }, 4.08);
      tl.to(".next-chip", { opacity: 1, y: 0, duration: 0.48 }, 4.42);

      tl.to(".large-char", { scale: 1.035, duration: 0.45, yoyo: true, repeat: 1, ease: "sine.inOut" }, 4.72);
      tl.to(".lamb", { y: -28, duration: 0.55, yoyo: true, repeat: 1, ease: "sine.inOut" }, 4.88);
      tl.to(".bluebird", { y: -34, duration: 0.55, yoyo: true, repeat: 1, ease: "sine.inOut" }, 4.92);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
